<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wyszukiwarka — Spotykaj</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <a class="brand" href="index.html">spotykaj</a>
    <nav class="nav-links">
      <a href="app.html" class="btn btn-ghost">Panel</a>
    </nav>
  </div>
</header>

<main class="container page">

  <div class="box">
    <h1>Wyszukaj ogłoszenia</h1>
    <p class="muted">Wybierz województwo i miasto</p>

    <div class="grid2">
      <select id="filterWoj">
        <option value="">Wszystkie województwa</option>
        <option>Zachodniopomorskie</option>
        <option>Pomorskie</option>
        <option>Mazowieckie</option>
        <option>Śląskie</option>
        <option>Dolnośląskie</option>
      </select>

      <input id="filterCity" placeholder="Miasto..." />
    </div>

    <button id="searchBtn" class="btn btn-primary">Szukaj</button>
  </div>

  <div id="results" class="cards" style="margin-top:20px;"></div>

</main>

<script src="js/browse.js"></script>
</body>
</html>
